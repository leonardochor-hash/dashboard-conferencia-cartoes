<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de Cartões · LivePDV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f10;
  --surface: #1a1a1c;
  --surface-2: #232326;
  --border: #2a2a2e;
  --border-hover: #3a3a3f;
  --text: #ededee;
  --text-muted: #8a8a90;
  --text-dim: #5a5a5f;
  --accent: #d4a574;
  --success: #4ade80;
  --warning: #facc15;
  --danger: #f87171;
  --info: #60a5fa;
  --font-serif: 'Fraunces', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ===== LOGIN ===== */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
}
.login-box h1 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 28px;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.login-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
.login-box label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.login-box input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}
.login-box input:focus { outline: none; border-color: var(--accent); }
.login-box button {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #1a1a1c;
  border: none;
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.login-box button:hover { opacity: 0.9; }
.login-error {
  color: var(--danger);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}

/* ===== DASHBOARD ===== */
.app { display: none; }
.app.active { display: block; }

header {
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
header h1 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.3px;
}
header .subtitle {
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 2px;
}
header .actions { display: flex; gap: 10px; align-items: center; }

select, .btn {
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
select:hover, .btn:hover { border-color: var(--border-hover); background: var(--surface-2); }
.btn-primary {
  background: var(--accent);
  color: #1a1a1c;
  border-color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover { opacity: 0.9; background: var(--accent); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-success {
  background: rgba(74, 222, 128, 0.1);
  color: var(--success);
  border-color: rgba(74, 222, 128, 0.3);
}
.btn-success:hover { background: rgba(74, 222, 128, 0.15); }
.btn-icon-only { padding: 8px 10px; }

main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

/* ===== CARDS ===== */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.stat-card .label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.stat-card .value {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 500;
}
.stat-card.success .value { color: var(--success); }
.stat-card.warning .value { color: var(--warning); }
.stat-card.danger .value { color: var(--danger); }

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
  font-weight: 500;
}

/* ===== ITEMS ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .big-check {
  font-family: var(--font-serif);
  font-size: 48px;
  color: var(--success);
  margin-bottom: 12px;
}

.item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.item:hover { border-color: var(--border-hover); }
.item.match { border-left-color: var(--warning); }
.item.cod_errado { border-left-color: var(--accent); }
.item.codigo_duplicado { border-left-color: #fb923c; }
.item.duplicado { border-left-color: #c084fc; }
.item.divergencia { border-left-color: var(--danger); }
.item.orfao { border-left-color: var(--danger); }
.item.fantasma { border-left-color: var(--info); }

.item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.item-header-left { display: flex; flex-direction: column; gap: 4px; }
.item-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.item-meta strong { color: var(--text); font-family: var(--font-mono); }

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  width: fit-content;
}
.badge.match { background: rgba(250, 204, 21, 0.15); color: var(--warning); }
.badge.cod_errado { background: rgba(212, 165, 116, 0.18); color: var(--accent); }
.badge.codigo_duplicado { background: rgba(251, 146, 60, 0.15); color: #fb923c; }
.cand-sel { margin-top: 10px; padding: 10px 12px; border: 1px dashed #fb923c; border-radius: 8px; background: rgba(251,146,60,0.06); }
.cand-sel .stitle { margin-bottom: 6px; }
.cand-opt { display: block; padding: 5px 4px; cursor: pointer; border-radius: 6px; }
.cand-opt:hover { background: rgba(255,255,255,0.04); }
.cand-opt input { margin-right: 8px; }
.badge.duplicado { background: rgba(192, 132, 252, 0.15); color: #c084fc; }
.badge.divergencia, .badge.orfao { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
.badge.fantasma { background: rgba(96, 165, 250, 0.15); color: var(--info); }

.badge-conf {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 6px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.badge-conf.alta { background: rgba(74, 222, 128, 0.15); color: var(--success); }
.badge-conf.media { background: rgba(250, 204, 21, 0.15); color: var(--warning); }

.suggestion {
  background: var(--surface-2);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 12px;
  font-size: 12.5px;
  line-height: 1.55;
  border-left: 2px solid var(--accent);
}
.suggestion .stitle {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.suggestion code {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  word-break: break-all;
}

.item-value {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
}
.item-value.danger { color: var(--danger); }

.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.compare > div {
  background: var(--surface-2);
  border-radius: 6px;
  padding: 8px 12px;
}
.compare .label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.compare .data {
  font-family: var(--font-mono);
  font-size: 12px;
  word-break: break-all;
}
.compare .data strong { color: var(--accent); }

.item-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.item-actions .btn { font-size: 12px; padding: 6px 12px; }

.loading {
  display: none;
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}
.loading.active { display: block; }
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  header, main { padding: 16px 18px; }
  .compare { grid-template-columns: 1fr; }
  .item-actions { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Conferência de cartões</h1>
    <p>LivePDV ↔ Zoop</p>
    <label>Senha de acesso</label>
    <input type="password" id="login-password" autofocus onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta.</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app">
  <header>
    <div>
      <h1>Conferência de cartões</h1>
      <div class="subtitle" id="header-subtitle">Hoje · LivePDV ↔ Zoop</div>
    </div>
    <div class="actions">
      <select id="loja-filter" onchange="renderList()">
        <option value="all">Todas as lojas</option>
        <option value="1">RSul (RS)</option>
        <option value="3">Barrabox (BS)</option>
        <option value="4">NovaPS (NS)</option>
      </select>
      <select id="data-filter" onchange="conferir()"></select>
      <button class="btn btn-primary" id="btn-conferir" onclick="conferir()">
        ↻ Conferir agora
      </button>
      <button class="btn btn-icon-only" onclick="logout()" title="Sair">⎋</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card success">
        <div class="label">Conciliado</div>
        <div class="value" id="stat-ok">—</div>
      </div>
      <div class="stat-card warning">
        <div class="label">Sugestões (aceitar)</div>
        <div class="value" id="stat-match">—</div>
      </div>
      <div class="stat-card danger">
        <div class="label">Diverg. / Duplicados</div>
        <div class="value" id="stat-diverg">—</div>
      </div>
      <div class="stat-card danger">
        <div class="label">Órfãos / Fantasmas</div>
        <div class="value" id="stat-orfao">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="pendentes" onclick="switchTab('pendentes')">
        Pendentes <span id="count-pendentes">(0)</span>
      </div>
      <div class="tab" data-tab="resolvidos" onclick="switchTab('resolvidos')">
        Resolvidos <span id="count-resolvidos">(0)</span>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <span class="spinner"></span> Buscando dados do Moombox...
    </div>

    <!-- Lista -->
    <div id="lista"></div>
  </main>
</div>

<script>
// ============= CONFIG =============
const DASHBOARD_PASSWORD = 'cartoes2026'; // mude isso depois
const STORAGE_KEY = 'conf_cartoes_auth';
const RESOLVED_KEY = 'conf_cartoes_resolved';
const API_ENDPOINT = '/api/conferir';

const LOJA_NOMES = { 1: 'RSul', 3: 'Barrabox', 4: 'NovaPS' };

// ============= STATE =============
let dados = { problemas: [], stats: {} };
let resolvidos = loadResolved();
let currentTab = 'pendentes';

// ============= LOGIN =============
function checkAuth() {
  if (sessionStorage.getItem(STORAGE_KEY) === 'ok') {
    showApp();
  }
}
function doLogin() {
  const pwd = document.getElementById('login-password').value;
  if (pwd === DASHBOARD_PASSWORD) {
    sessionStorage.setItem(STORAGE_KEY, 'ok');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() {
  sessionStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  popularDatas();
  conferir();
}

function popularDatas() {
  const select = document.getElementById('data-filter');
  if (!select) return;
  const hoje = new Date();
  hoje.setHours(12, 0, 0, 0);
  const opts = [];
  for (let i = 0; i <= 30; i++) {
    const d = new Date(hoje);
    d.setDate(hoje.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    const dia = String(d.getDate()).padStart(2, '0');
    const mes = String(d.getMonth() + 1).padStart(2, '0');
    const ano = d.getFullYear();
    let label = `${dia}/${mes}/${ano}`;
    if (i === 0) label = `Hoje · ${label}`;
    else if (i === 1) label = `Ontem · ${label}`;
    opts.push(`<option value="${iso}"${i === 0 ? ' selected' : ''}>${label}</option>`);
  }
  select.innerHTML = opts.join('');
}

// ============= STORAGE (resolvidos) =============
function loadResolved() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const stored = JSON.parse(localStorage.getItem(RESOLVED_KEY) || '{}');
    if (stored.date !== today) return { date: today, ids: {} };
    return stored;
  } catch { return { date: new Date().toISOString().slice(0, 10), ids: {} }; }
}
function saveResolved() {
  localStorage.setItem(RESOLVED_KEY, JSON.stringify(resolvidos));
}
function marcarResolvido(id, action) {
  resolvidos.ids[id] = { action, at: new Date().toISOString() };
  saveResolved();
  renderList();
  updateStats();
}

// Aceitar uma correção sugerida (semi-automático: o sistema sugere, você aceita).
//   modo "preencher"  -> grava o cód num pagamento que está sem código (caso "match")
//   modo "substituir" -> troca o cód errado pelo correto (caso "cod_errado")
async function aceitarCorrecao(id, cupomId, codCorreto, valorEsperado, modo, codErrado) {
  modo = modo || 'preencher';
  const labelBtn = '✓ Aceitar correção';
  const resumo = modo === 'substituir'
    ? `Trocar o código do cupom ${cupomId}:\nde  ${(codErrado||'').slice(0,16)}...\npara ${codCorreto.slice(0,16)}...`
    : `Preencher o código do cupom ${cupomId} com ${codCorreto.slice(0,16)}...`;
  if (!confirm(`${resumo}\n\nIsso vai SALVAR a alteração no LivePDV.`)) return;

  const btn = event && event.target ? event.target : null;
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  try {
    const res = await fetch('/api/aprovar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cupom_id: String(cupomId).replace(/^0+/, ''),
        cod_autoriza: codCorreto,
        valor_esperado: valorEsperado,
        modo: modo,
        cod_atual: codErrado || undefined,
      }),
    });
    const data = await res.json().catch(() => null);

    if (!res.ok) {
      const erro = data?.error || `HTTP ${res.status}`;
      alert(`❌ Falhou: ${erro}\n\n${data?.traceback ? data.traceback.slice(0, 400) : ''}`);
      if (btn) { btn.disabled = false; btn.textContent = labelBtn; }
      return;
    }

    marcarResolvido(id, modo === 'substituir' ? 'cod_corrigido' : 'cod_preenchido');
    alert(`✅ Correção aplicada no LivePDV.\nCupom: ${cupomId}`);
  } catch (e) {
    alert(`❌ Erro de rede: ${e.message}`);
    if (btn) { btn.disabled = false; btn.textContent = labelBtn; }
  }
}
// Aceitar correção de duplicado: APAGA o pagamento de cartão do cupom.
async function apagarPagamento(id, cupomId, valorEsperado) {
  if (!confirm(`APAGAR o pagamento de cartão de ${fmtMoney(valorEsperado)} do cupom ${cupomId}?\n\nIsso remove a linha de cartão do cupom no LivePDV.`)) return;
  const btn = event && event.target ? event.target : null;
  if (btn) { btn.disabled = true; btn.textContent = 'Apagando...'; }
  try {
    const res = await fetch('/api/aprovar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cupom_id: String(cupomId).replace(/^0+/, ''),
        modo: 'apagar',
        valor_esperado: valorEsperado,
      }),
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      alert(`❌ Falhou: ${data?.error || 'HTTP ' + res.status}`);
      if (btn) { btn.disabled = false; btn.textContent = '✓ Aceitar (apagar cartão)'; }
      return;
    }
    marcarResolvido(id, 'cartao_apagado');
    alert(`✅ Pagamento de cartão apagado do cupom ${cupomId}.`);
  } catch (e) {
    alert(`❌ Erro de rede: ${e.message}`);
    if (btn) { btn.disabled = false; btn.textContent = '✓ Aceitar (apagar cartão)'; }
  }
}
function reabrir(id) {
  delete resolvidos.ids[id];
  saveResolved();
  renderList();
  updateStats();
}

// ============= API =============
async function conferir() {
  const btn = document.getElementById('btn-conferir');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  loading.classList.add('active');
  document.getElementById('lista').innerHTML = '';

  const dataInput = document.getElementById('data-filter');
  const dataParam = dataInput && dataInput.value ? `?data=${dataInput.value}` : '';
  const url = API_ENDPOINT + dataParam;

  try {
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      const detalhe = data ? `
        <div style="text-align:left; max-width:700px; margin: 16px auto; padding: 12px; background: var(--surface-2); border-radius: 6px; font-family: var(--font-mono); font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow:auto;">
          <strong>Tipo:</strong> ${data.type || '?'}
          <strong>Erro:</strong> ${data.error || '?'}
          ${data.detail ? `\n<strong>Detalhe:</strong> ${data.detail}` : ''}
          ${data.traceback ? `\n\n<strong>Traceback:</strong>\n${data.traceback}` : ''}
        </div>` : '';
      document.getElementById('lista').innerHTML = `
        <div class="empty-state">
          <div style="color: var(--danger); font-size: 16px; margin-bottom: 8px;">Erro HTTP ${res.status}</div>
          ${detalhe}
        </div>`;
      return;
    }
    dados = data;
    updateStats();
    renderList();
    const ts = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const dataRef = data.data_referencia ? new Date(data.data_referencia + 'T12:00:00').toLocaleDateString('pt-BR') : 'hoje';
    const totais = data.totais || {};
    document.getElementById('header-subtitle').textContent =
      `${dataRef} · ${totais.vendas_livepdv || 0} vendas PDV · ${totais.transacoes_zoop || 0} Zoop · conferido ${ts}`;
  } catch (e) {
    document.getElementById('lista').innerHTML = `
      <div class="empty-state">
        <div style="color: var(--danger); font-size: 16px; margin-bottom: 8px;">Erro ao buscar dados</div>
        <div style="font-size: 13px;">${e.message}</div>
      </div>`;
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

// ============= RENDER =============
function updateStats() {
  const s = dados.stats || {};
  document.getElementById('stat-ok').textContent = s.conciliado || 0;
  // Sugestões com botão "Aceitar": preencher cód (match) + trocar cód (cod_errado)
  document.getElementById('stat-match').textContent = countByType('match') + countByType('cod_errado') + countByType('codigo_duplicado');
  document.getElementById('stat-diverg').textContent = countByType('divergencia') + countByType('duplicado');
  document.getElementById('stat-orfao').textContent = countByType('orfao') + countByType('fantasma');

  const filtered = filterByLoja(dados.problemas || []);
  const pendentes = filtered.filter(p => !resolvidos.ids[p.id]).length;
  const resolvedos = filtered.filter(p => resolvidos.ids[p.id]).length;
  document.getElementById('count-pendentes').textContent = `(${pendentes})`;
  document.getElementById('count-resolvidos').textContent = `(${resolvedos})`;
}

function countByType(type) {
  const filtered = filterByLoja(dados.problemas || []);
  return filtered.filter(p => p.tipo === type && !resolvidos.ids[p.id]).length;
}

function filterByLoja(items) {
  const loja = document.getElementById('loja-filter').value;
  if (loja === 'all') return items;
  return items.filter(p => String(p.loja_id) === loja);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderList();
}

function fmtMoney(v) {
  return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function renderList() {
  updateStats();
  const lista = document.getElementById('lista');
  const filtered = filterByLoja(dados.problemas || []);
  const items = currentTab === 'pendentes'
    ? filtered.filter(p => !resolvidos.ids[p.id])
    : filtered.filter(p => resolvidos.ids[p.id]);

  if (items.length === 0) {
    if (currentTab === 'pendentes' && (dados.problemas || []).length > 0) {
      lista.innerHTML = `
        <div class="empty-state">
          <div class="big-check">✓</div>
          <div>Nenhum problema pendente nesta loja.</div>
        </div>`;
    } else if (currentTab === 'pendentes') {
      lista.innerHTML = `
        <div class="empty-state">
          <div>Clique em "Conferir agora" para buscar os dados do dia.</div>
        </div>`;
    } else {
      lista.innerHTML = `
        <div class="empty-state"><div>Nenhum item resolvido ainda.</div></div>`;
    }
    return;
  }

  lista.innerHTML = items.map(renderItem).join('');
}

function codEscolhido(pid, fallback) {
  const sel = document.querySelector(`input[name="cand_${pid}"]:checked`);
  return sel ? sel.value : fallback;
}
function renderCandidatos(p) {
  const def = p.cod_certo || p.zoop_id || '';
  const opts = p.candidatos.map(c =>
    `<label class="cand-opt"><input type="radio" name="cand_${p.id}" value="${c.zoop_id}" ${c.zoop_id === def ? 'checked' : ''}> `
    + `${fmtMoney(c.valor)} · <code>${c.zoop_id}</code>${c.cod_autorizacao ? ` · aut ${c.cod_autorizacao}` : ''}</label>`
  ).join('');
  return `<div class="cand-sel"><div class="stitle">Escolha o cartão Zoop correto (${p.candidatos.length} no mesmo valor):</div>${opts}</div>`;
}

function renderItem(p) {
  const lojaNome = LOJA_NOMES[p.loja_id] || `Loja ${p.loja_id}`;
  const cupomText = p.cupom ? `Cupom <strong>#${p.cupom}</strong>` : '<em style="color: var(--text-dim)">sem cupom no LivePDV</em>';
  const formaText = p.forma_pagto ? ` · ${p.forma_pagto}` : '';
  const isResolved = !!resolvidos.ids[p.id];

  let badge, title, body, actions;
  const confBadge = p.confianca
    ? `<span class="badge-conf ${p.confianca}">confiança ${p.confianca}</span>`
    : '';

  if (p.tipo === 'match') {
    badge = `<span class="badge match">Cód. em branco</span>${confBadge}`;
    body = `
      <div class="suggestion">
        <div class="stitle">Correção sugerida</div>
        Preencher o cód. de autorização do cupom <strong>#${p.cupom}</strong> com a transação Zoop
        de ${fmtMoney(p.valor_zoop || p.valor)}: <code>${p.zoop_id}</code>${p.outros_candidatos ? ` <span style="color:var(--warning)">(há ${p.outros_candidatos} outra(s) transação(ões) no mesmo valor — confira antes)</span>` : ''}
      </div>
      <div class="compare">
        <div>
          <div class="label">LivePDV · cupom ${p.cupom}</div>
          <div class="data">${fmtMoney(p.valor)} · cod aut: <strong>vazio</strong></div>
        </div>
        <div>
          <div class="label">Zoop (succeeded) sugerido</div>
          <div class="data">${fmtMoney(p.valor_zoop || p.valor)} · ID: <strong>${p.zoop_id}</strong></div>
        </div>
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn" onclick="marcarResolvido('${p.id}','ignorado')">Ignorar</button>
         <button class="btn btn-success" onclick="aceitarCorrecao('${p.id}','${p.cupom}',codEscolhido('${p.id}','${p.zoop_id}'),${p.valor},'preencher')">✓ Aceitar correção</button>`;
  } else if (p.tipo === 'cod_errado') {
    badge = `<span class="badge cod_errado">Cód. errado</span>${confBadge}`;
    body = `
      <div class="suggestion">
        <div class="stitle">Correção sugerida</div>
        Trocar o cód. de autorização do cupom <strong>#${p.cupom}</strong>:<br>
        de <code>${p.cod_errado}</code><br>
        para <code>${p.cod_certo}</code> (transação Zoop de ${fmtMoney(p.valor_zoop || p.valor)})${p.outros_candidatos ? ` <span style="color:var(--warning)">(há ${p.outros_candidatos} outra(s) no mesmo valor — confira antes)</span>` : ''}
      </div>
      <div class="compare">
        <div>
          <div class="label">LivePDV · cupom ${p.cupom} (cód atual, errado)</div>
          <div class="data">${fmtMoney(p.valor)} · <strong>${p.cod_errado}</strong></div>
        </div>
        <div>
          <div class="label">Zoop (succeeded) correto</div>
          <div class="data">${fmtMoney(p.valor_zoop || p.valor)} · <strong>${p.cod_certo}</strong></div>
        </div>
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn" onclick="marcarResolvido('${p.id}','ignorado')">Ignorar</button>
         <button class="btn btn-success" onclick="aceitarCorrecao('${p.id}','${p.cupom}',codEscolhido('${p.id}','${p.cod_certo}'),${p.valor},'substituir','${p.cod_errado}')">✓ Aceitar correção</button>`;
  } else if (p.tipo === 'codigo_duplicado') {
    badge = `<span class="badge codigo_duplicado">Código duplicado</span>${confBadge}`;
    const compartil = (p.compartilhado_com && p.compartilhado_com.length)
      ? p.compartilhado_com.map(c => '#' + c).join(', ') : '—';
    if (p.cod_certo) {
      body = `
        <div class="suggestion">
          <div class="stitle">Correção sugerida</div>
          O código <code>${p.cod_errado}</code> está lançado em mais de um cupom (${compartil}${p.dono_provavel ? `; dono provável #${p.dono_provavel}` : ''}).
          No cupom <strong>#${p.cupom}</strong> ele está errado.<br>
          Trocar para <code>${p.cod_certo}</code> — transação Zoop de ${fmtMoney(p.valor_zoop || p.valor)} na mesma loja${p.outros_candidatos ? ` <span style="color:var(--warning)">(há ${p.outros_candidatos} outra(s) no mesmo valor — confira antes)</span>` : ''}
        </div>
        <div class="compare">
          <div>
            <div class="label">LivePDV · cupom ${p.cupom} (cód duplicado)</div>
            <div class="data">${fmtMoney(p.valor)} · <strong>${p.cod_errado}</strong></div>
          </div>
          <div>
            <div class="label">Zoop (succeeded) correto</div>
            <div class="data">${fmtMoney(p.valor_zoop || p.valor)} · <strong>${p.cod_certo}</strong></div>
          </div>
        </div>`;
      actions = isResolved
        ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
        : `<button class="btn" onclick="marcarResolvido('${p.id}','ignorado')">Ignorar</button>
           <button class="btn btn-success" onclick="aceitarCorrecao('${p.id}','${p.cupom}',codEscolhido('${p.id}','${p.cod_certo}'),${p.valor},'substituir','${p.cod_errado}')">✓ Aceitar correção</button>`;
    } else {
      body = `
        <div class="suggestion">
          <div class="stitle">Atenção — investigar</div>
          O código <code>${p.cod_errado}</code> aparece em mais de um cupom (${compartil}), mas não há
          transação Zoop de ${fmtMoney(p.valor)} livre na loja para o cupom <strong>#${p.cupom}</strong>.
          Confira manualmente qual cartão é o correto.
        </div>`;
      actions = isResolved
        ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
        : `<button class="btn btn-success" onclick="marcarResolvido('${p.id}','investigando')">Marcar como visto</button>`;
    }
  } else if (p.tipo === 'duplicado') {
    badge = '<span class="badge duplicado">Cartão duplicado</span>';
    body = `
      <div class="suggestion">
        <div class="stitle">Correção sugerida</div>
        O cupom <strong>#${p.cupom}</strong> tem um pagamento de cartão de ${fmtMoney(p.valor)}
        que parece duplicado: há outro(s) lançamento(s) de mesmo valor na loja, mas só
        ${p.zoop_no_valor} transação(ões) Zoop nesse valor.
        Sugestão: <strong>apagar o pagamento de cartão deste cupom</strong>.
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn" onclick="marcarResolvido('${p.id}','nao_era_dup')">Não é duplicado</button>
         <button class="btn btn-success" onclick="apagarPagamento('${p.id}','${p.cupom}',${p.valor})">✓ Aceitar (apagar cartão)</button>`;
  } else if (p.tipo === 'divergencia') {
    badge = '<span class="badge divergencia">Divergência de valor</span>';
    const delta = fmtMoney(Math.abs(p.valor_zoop - p.valor_livepdv));
    body = `
      <div class="compare">
        <div>
          <div class="label">LivePDV · cupom ${p.cupom}</div>
          <div class="data">${fmtMoney(p.valor_livepdv)} · ${p.zoop_id}</div>
        </div>
        <div>
          <div class="label">Zoop</div>
          <div class="data">${fmtMoney(p.valor_zoop)} · ${p.zoop_id}</div>
        </div>
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn" onclick="marcarResolvido('${p.id}','investigando')">Investigar</button>
         <button class="btn btn-success" onclick="marcarResolvido('${p.id}','resolvido')">Marcar resolvido</button>`;
  } else if (p.tipo === 'orfao') {
    badge = '<span class="badge orfao">Cartão órfão</span>';
    body = `
      <div class="compare" style="grid-template-columns: 1fr;">
        <div>
          <div class="label">Zoop (succeeded) sem venda no LivePDV</div>
          <div class="data">${p.zoop_id} · ${p.bandeira || ''} ${p.tipo_pagamento || ''}</div>
        </div>
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn" onclick="marcarResolvido('${p.id}','buscando')">Buscar no LivePDV</button>
         <button class="btn btn-success" onclick="marcarResolvido('${p.id}','resolvido')">Marcar resolvido</button>`;
  } else {
    badge = '<span class="badge fantasma">Venda fantasma</span>';
    body = `
      <div class="compare" style="grid-template-columns: 1fr;">
        <div>
          <div class="label">LivePDV sem transação Zoop</div>
          <div class="data">Cupom ${p.cupom} · cod aut: ${p.cod_aut || 'vazio'}</div>
        </div>
      </div>`;
    actions = isResolved
      ? `<button class="btn" onclick="reabrir('${p.id}')">Reabrir</button>`
      : `<button class="btn btn-success" onclick="marcarResolvido('${p.id}','resolvido')">Marcar resolvido</button>`;
  }

  if (p.candidatos && p.candidatos.length > 1 && !isResolved) {
    body += renderCandidatos(p);
  }

  const valorDisplay = p.tipo === 'divergencia'
    ? `<span class="item-value danger">Δ ${fmtMoney(Math.abs(p.valor_zoop - p.valor_livepdv))}</span>`
    : `<span class="item-value">${fmtMoney(p.valor || p.valor_zoop || p.valor_livepdv || 0)}</span>`;

  return `
    <div class="item ${p.tipo}">
      <div class="item-header">
        <div class="item-header-left">
          ${badge}
          <div class="item-meta">
            ${lojaNome} · ${p.hora || '—'} · ${cupomText}${formaText}
          </div>
        </div>
        ${valorDisplay}
      </div>
      ${body}
      <div class="item-actions">${actions}</div>
    </div>`;
}

// ============= INIT =============
checkAuth();
</script>
</body>
</html>
